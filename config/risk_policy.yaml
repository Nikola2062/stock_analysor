# Tactical exit / re-entry policy.
# Controls when to defensively trim or sell a long-term holding and the rebuy plan.
#
# Design philosophy:
#   - Don't whipsaw on normal 5-10% corrections (US markets do this 3-4x/year).
#   - Require BOTH high magnitude AND high probability AND signal persistence.
#   - Graduated response: trim before exit, never 100% -> 0% in one step.
#   - Pre-commit rebuy plan before exit. No "wait and see."
#   - Tax-aware: prefer long-term holds (>365 days in US) and respect wash-sale.

forecast_horizon_days: 90              # rolling 3-month outlook window
signal_persistence_days_min: 3         # signal must hold for >= 3 days before action
cooldown_days_between_actions: 5       # whipsaw protection — minimum gap between trades on same name

# Cold-start whipsaw guard:
# A fresh install (or a freshly added symbol) has no audit history to satisfy the
# persistence check, so without this cap a brand-new run could fire BLACK_EXIT
# on day 1. We require at least N prior audit runs for the symbol before
# high-impact actions (defensive_reduction, full_exit) can fire. Until then,
# the maximum firing level is capped — so a real-crisis install still triggers
# a measured trim but not a panicked full exit.
cold_start_min_history_runs: 3
cold_start_max_action_level: 2         # 1=monitor_only, 2=trim, 3=defensive_reduction, 4=full_exit

# Rebuy-band staleness:
# When tactical_exit fires a trim/exit it stages a pre-committed rebuy band. If
# the band is never reached, the user sits in cash watching the rally. After
# this many days without the price entering the band, Monitor emits a
# `rebuy_stale` alert asking the user to re-evaluate the thesis from scratch
# (rather than silently waiting forever).
rebuy_staleness_days: 30

# Action ladder. Levels are evaluated top-down; the highest-level trigger that fires wins.
actions:
  - level: 1
    label: YELLOW_WATCH
    trigger:
      drawdown_magnitude_pct: 10
      probability_min: 0.40
      persistence_days: 2
    action: monitor_only
    description: "Daily re-evaluation. No trade."

  - level: 2
    label: ORANGE_TRIM
    trigger:
      drawdown_magnitude_pct: 15
      probability_min: 0.55
      persistence_days: 3
    action: trim
    trim_pct_of_position: 30
    rebuy_at_drawdown_pct: [10, 15]    # rebuy band: current_px * (1 - 0.10) down to * (1 - 0.15)
    rebuy_pct_of_trimmed: 100
    hedge_remainder: false
    description: "Trim 30%. Plan to rebuy if name drops 10-15% from trim price."

  - level: 3
    label: RED_DEFENSIVE
    trigger:
      drawdown_magnitude_pct: 20
      probability_min: 0.65
      persistence_days: 5
    action: defensive_reduction
    trim_pct_of_position: 70           # leave 30% in
    rebuy_at_drawdown_pct: [15, 22]
    rebuy_pct_of_trimmed: 100
    hedge_remainder: true              # hedge the 30% you keep, via futures
    description: "Trim 70%, hedge remainder, rebuy if down 15-22%."

  - level: 4
    label: BLACK_EXIT
    trigger:
      drawdown_magnitude_pct: 25
      probability_min: 0.75
      persistence_days: 5
    action: full_exit
    trim_pct_of_position: 100
    rebuy_at_drawdown_pct: [22, 30]
    rebuy_pct_of_trimmed: 100
    hedge_remainder: false
    description: "Full exit. Pre-committed rebuy band 22-30% below exit price."

# Tax / behavioral guards layered on top of the action ladder.
tax_awareness:
  enable_long_term_holding_check: true
  long_term_holding_days_us: 365             # US: long-term cap gains at >365 days held
  wash_sale_avoidance_days: 31               # US: don't rebuy within 30 days after a LOSS-sale
  prefer_trim_over_full_exit_when_close_to_long_term: true
  long_term_proximity_window_days: 60        # within 60 days of long-term threshold -> prefer trim

# Volatility scaling: high-vol names need wider thresholds so we don't whipsaw on normal moves.
# Scales drawdown_magnitude_pct values by these factors at runtime.
volatility_adjustment:
  enable: true
  realized_vol_window_days: 30
  high_vol_threshold_annualized_pct: 40
  low_vol_threshold_annualized_pct: 20
  high_vol_factor: 1.3
  low_vol_factor: 0.8

# Minimum position size to be eligible for futures hedging — small positions
# aren't worth the contract size / margin friction.
hedging_minimums:
  min_position_value_usd: 50000
  prefer_etf_short_when_below_usd: 100000

# Intraday Monitor alert thresholds. Previously hardcoded in
# src/notifier/intraday_monitor.py. Editing here is the recommended way to tune
# what's "loud enough" to interrupt a trading day.
intraday_thresholds:
  drop_pct: -5.0      # alert when intraday move is this far below prior close
  spike_pct: 8.0      # alert when intraday move is this far above prior close
