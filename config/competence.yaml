# Competence Gate — pre-filter against the user's circle of competence.
# Per the investment framework, Ch.12 (能力圈): not what you know, but what you TRULY UNDERSTAND.
#
# Edit this to match your actual expertise. The defaults below assume tech/software/internet
# focus (matches your current holdings FIG + 0700.HK) plus Berkshire as a defensive anchor.
#
# Logic at runtime:
#   1. If symbol is in `always_in_circle`, → in_circle
#   2. If symbol is in `always_out_of_circle`, → out_of_circle
#   3. If sector matches `in_circle_sectors` AND none of the keywords in `out_of_circle_keywords`
#      appear in the business description → in_circle
#   4. If sector matches `out_of_circle_sectors` → out_of_circle
#   5. Otherwise → borderline (proceeds, but flagged in the UI)

# Allowed business profiles
in_circle_sectors:
  - Technology
  - Communication Services
  - Consumer Cyclical          # broad enough; refined via keywords below

in_circle_keywords:            # match against business description (case-insensitive)
  - software
  - internet
  - cloud
  - semiconductor
  - chip
  - AI
  - artificial intelligence
  - SaaS
  - platform
  - gaming
  - e-commerce
  - payment
  - fintech
  - design
  - developer tools

# Hard rejects — businesses you've explicitly decided are outside your circle.
out_of_circle_sectors:
  - Energy                     # oil & gas exploration is geology + politics, not in circle
  - Basic Materials            # mining / metals
  - Utilities                  # regulated rate-base
  - Real Estate                # REIT-specific accounting
  - Healthcare                 # drug pipelines + FDA regulation = specialist domain

out_of_circle_keywords:
  - mining
  - exploration
  - drilling
  - biotechnology
  - pharmaceutical
  - clinical trial
  - drug pipeline
  - REIT

# Explicit overrides — symbol-level whitelist and blacklist
always_in_circle:
  - BRK.B                      # holding company; behaves like an asset allocator + insurance + cap allocator
  - SPY
  - QQQ

always_out_of_circle: []       # add tickers here that you definitively want to skip

# When verdict = out_of_circle, what does the system do?
on_out_of_circle:
  # Options:
  #   "skip"     — do not run the full pipeline at all (saves LLM cost)
  #   "analyze_but_flag" — still run, but mark recommendation as OUTSIDE_CIRCLE_PASS
  policy: analyze_but_flag

notes: |
  This is YOUR circle, not Claude's. Edit it as your understanding deepens or contracts.
  Per Ch.12 of the investment framework, the biggest risk is not knowing what you don't know —
  being honest here protects you from buying the next "obvious" thing you actually don't grasp.
